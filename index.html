<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timer</title>
  <style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Google Sans', Roboto, Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: #202124;
}

.timer-container {
  text-align: center;
  padding: 20px;
}

.display {
  font-size: 72px;
  font-weight: 400;
  color: #e8eaed;
  letter-spacing: -1px;
  margin-bottom: 24px;
}

.quick-buttons {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-bottom: 20px;
}

.quick {
  padding: 8px 16px;
  font-size: 14px;
  font-weight: 500;
  border: 1px solid #5f6368;
  border-radius: 20px;
  background: transparent;
  color: #8ab4f8;
  cursor: pointer;
  transition: all 0.2s;
}

.quick:hover {
  background: #8ab4f833;
  border-color: #8ab4f8;
}

.buttons {
  display: flex;
  gap: 12px;
  justify-content: center;
}

button {
  padding: 10px 24px;
  font-size: 14px;
  font-weight: 500;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.2s;
}

.start {
  background: #8ab4f8;
  color: #202124;
}

.start:hover { 
  background: #aecbfa; 
}

.reset {
  background: #3c4043;
  color: #e8eaed;
}

.reset:hover { 
  background: #5f6368; 
}
  </style>
</head>
<body>
  <div class="timer-container">
    <div class="display">25:00</div>
    
    <div class="quick-buttons">
      <button class="quick" onclick="setTime(25)">25 min</button>
      <button class="quick" onclick="setTime(10)">10 min</button>
      <button class="quick" onclick="setTime(5)">5 min</button>
    </div>
    
    <div class="buttons">
      <button class="start" onclick="toggleTimer()">Iniciar</button>
      <button class="reset" onclick="resetTimer()">Reiniciar</button>
    </div>
  </div>

  <script>
let interval = null;
let isRunning = false;
let endTime = null;
let remainingMs = 25 * 60 * 1000; // guardamos en milisegundos

const display = document.querySelector('.display');
const startBtn = document.querySelector('.start');

function updateDisplay() {
  const totalSeconds = Math.ceil(remainingMs / 1000);
  const m = Math.floor(totalSeconds / 60);
  const s = totalSeconds % 60;
  display.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function setTime(minutes) {
  if (isRunning) return;
  remainingMs = minutes * 60 * 1000;
  updateDisplay();
}

function tick() {
  if (!isRunning) return;
  
  const now = Date.now();
  remainingMs = endTime - now;
  
  if (remainingMs <= 0) {
    remainingMs = 0;
    updateDisplay();
    clearInterval(interval);
    startBtn.textContent = 'Iniciar';
    isRunning = false;
    
    // Beep
    const audio = new AudioContext();
    const osc = audio.createOscillator();
    osc.connect(audio.destination);
    osc.frequency.value = 800;
    osc.start();
    setTimeout(() => osc.stop(), 200);
    return;
  }
  
  updateDisplay();
}

function toggleTimer() {
  if (isRunning) {
    // Pausar: guardar tiempo restante
    clearInterval(interval);
    remainingMs = endTime - Date.now();
    startBtn.textContent = 'Continuar';
    isRunning = false;
  } else {
    // Iniciar/continuar
    if (remainingMs <= 0) return;
    endTime = Date.now() + remainingMs;
    interval = setInterval(tick, 100); // chequear más seguido para precisión
    startBtn.textContent = 'Pausar';
    isRunning = true;
  }
}

function resetTimer() {
  clearInterval(interval);
  remainingMs = 25 * 60 * 1000;
  isRunning = false;
  endTime = null;
  updateDisplay();
  startBtn.textContent = 'Iniciar';
}

updateDisplay();
  </script>
</body>
</html>
